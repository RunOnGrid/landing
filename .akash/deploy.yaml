---
version: "2.0"

metadata:
  name: landing
  description: "GridCloud Landing Page"
  version: "1.0.0"
  author: "RunOnGrid"
  website: "https://ongrid.run"

services:
  web:
    image: ghcr.io/runongrid/landing:latest
    credentials:
      host: ghcr.io
      username: runongrid
      password: env:GITHUB_PAT
    expose:
      - port: 80
        as: 80
        to:
          - global: true
    env:
      # Nginx configuration
      - NGINX_PORT=80
      - CORS_ORIGIN=*
      - CACHE_MAX_AGE=31536000
      
      # SMTP configuration (set these via environment variables)
      # - SMTP_HOST=
      # - SMTP_PORT=
      # - SMTP_SECURE=
      # - SMTP_USER=
      # - SMTP_PASS=
      # - SMTP_TO=

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.1
          attributes:
            arch: amd64
        memory:
          size: 128Mi
        storage:
          size: 512Mi
  placement:
    dcloud:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - "akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63"
          - "akash18qa2a2ltfyvkyj0ggj3hkvuj6twzyumuaru9s4"
      pricing:
        web: 
          denom: uakt
          amount: 1000

deployment:
  web:
    dcloud:
      profile: web
      count: 1
